name: DevSecOps Secure CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scans:
    name: Code Quality & SAST Testing
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

   - name: Set up Python Environment
  uses: actions/setup-python@v5
  with:
    python-version: '3.11'


    # 1. APPLICATION LINTING (Static Code Formatting Check)
    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    - name: Run Flake8 Code Quality Scanner
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # 2. SAST SCANNING (Static Application Security Testing)
    - name: Install Bandit Security Scanner
      run: pip install bandit
    - name: Execute Bandit Scan for Vulnerabilities (SQLi / Cleartext Keys Check)
      run: |
        bandit -r . -ll -v

  docker-build:
    name: Container Security Scanning
    needs: security-scans
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 3. CONTAINER SCANNING (Scans Dockerfile layers for infrastructure leaks)
    - name: Run Aqua Security Trivy Scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        severity: 'CRITICAL,HIGH'
