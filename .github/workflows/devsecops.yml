name: DevSecOps Secure Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scans:
    name: Code Quality and SAST Testing
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Testing Utilities
      run: |
        python -m pip install --upgrade pip
        pip install flake8 bandit

    - name: Run Flake8 Code Quality Scanner
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Execute Bandit SAST Vulnerability Scan
      run: |
        bandit -r . -ll -v

  docker-build:
    name: Container Security Scanning
    needs: security-scans
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Run Trivy Filesystem Security Assessment
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        severity: 'CRITICAL,HIGH'
