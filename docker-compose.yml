services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=mysql+pymysql://user:securepass@db:3306/capstone_db
      - SECRET_KEY=localdevsecretkey
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: capstone_db
      MYSQL_USER: user
      MYSQL_PASSWORD: securepass
      MYSQL_ROOT_PASSWORD: rootsecurepass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
